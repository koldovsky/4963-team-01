<div
  class="age-modal age-modal--open"
  id="ageModal"
  role="dialog"
  aria-modal="true"
>
  <div class="age-modal__backdrop"></div>
  <div class="age-modal__content">
    <h1 class="age-modal__title">Confirm Your Age</h1>
    <img
      class="age-modal__illustration"
      src="img/illustration.svg"
      alt="Fine illustration"
    />

    <p class="age-modal__copy">
      We don't sell alcohol to minors. Please confirm that you are over 21 years
      old to enter this site.
    </p>
    <div class="age-modal__actions">
      <button class="age-modal__button  button--primary" id="ageYes">
        Yes, I’m 21+
      </button>
      <a
        class="age-modal__button button--secondary"
        href="underage.html"
        id="ageNo"
        >No, I’m under 21</a
      >
    </div>
  </div>
</div>
<script>
  document.body.classList.add("modal-open");
  document.getElementById("ageYes")?.addEventListener("click", function () {
    document.getElementById("ageModal")?.classList.remove("age-modal--open");
    document.body.classList.remove("modal-open");
  });
</script>

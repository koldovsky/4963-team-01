<div class="cart">
  <div class="cart__modal">
    <div class="cart__header">
      <h2 class="cart__title">Shopping cart</h2>
      <button class="cart__close-button">
        <svg
          class="cart__close-icon"
          viewBox="0 0 25 25"
          xmlns="http://www.w3.org/2000/svg"
          height="100%"
        >
          <path
            d="M19.7 18.3c.4.4.4 1 0 1.4-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L12 13.4l-6.3 6.3c-.4.4-1 .4-1.4 0-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7l6.3-6.3-6.3-6.3c-.4-.4-.4-1 0-1.4.4-.4 1-.4 1.4 0l6.3 6.3 6.3-6.3c.4-.4 1-.4 1.4 0 .4.4.4 1 0 1.4L13.4 12l6.3 6.3z"
            fill="currentColor"
            style=""
          ></path>
          <mask
            id="a69a94b6c558f1ecb38478fb8"
            maskUnits="userSpaceOnUse"
            x="4"
            y="4"
            width="16"
            height="16"
            style=""
            fill="currentColor"
          >
            <path
              d="M19.7 18.3c.4.4.4 1 0 1.4-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L12 13.4l-6.3 6.3c-.4.4-1 .4-1.4 0-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7l6.3-6.3-6.3-6.3c-.4-.4-.4-1 0-1.4.4-.4 1-.4 1.4 0l6.3 6.3 6.3-6.3c.4-.4 1-.4 1.4 0 .4.4.4 1 0 1.4L13.4 12l6.3 6.3z"
              fill="currentColor"
              style=""
            ></path>
          </mask>
          <g
            mask="url(#a69a94b6c558f1ecb38478fb8)"
            style=""
            fill="currentColor"
          >
            <path fill="currentColor" d="M0 0h24v24H0z" style=""></path>
          </g>
        </svg>
      </button>
    </div>

    <div class="cart__body">
      <h3 class="cart__section-title">Products</h3>

      <ul class="cart__items-list">
        <li class="cart__items-list__item cart__item">
          <div class="cart__item-image-wrapper">
            <img
              class="cart__item-image"
              src="../img/wines-best-deals/cabernet.jpg"
              alt="Cabernet"
            />
          </div>

          <div class="cart__item-info">
            <h4 class="cart__item-info__name">Cabernet (093049)</h4>

            <div class="cart__item-info__reverse-group">
              <span class="cart__item-info__price">17,00USD</span>
              <div class="cart__item-info__qty-wrapper">
                <input
                  class="cart__item-info__qty"
                  type="number"
                  value="1"
                  min="1"
                />
                <div class="cart__item-info-qty__buttons">
                  <button
                    class="cart__item-info-qty__button cart__item-info-qty__button--increment"
                  >
                    <svg
                      class="cart__item-info-qty__button-icon"
                      width="14"
                      height="8"
                      viewBox="0 0 10 6"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M5.35067 0.155633C5.33527 0.138307 5.31853 0.122147 5.30057 0.107295C5.1069 -0.0528817 4.81533 -0.0312402 4.64933 0.155633L0.111189 5.26432C0.0394387 5.34509 -4.76276e-07 5.44797 -4.85577e-07 5.55435C-5.07094e-07 5.80047 0.206781 6 0.461859 6L9.53813 6C9.64838 6 9.755 5.96194 9.83871 5.89271C10.0324 5.73253 10.0548 5.4512 9.8888 5.26432L5.35067 0.155633Z"
                        fill="#9199AB"
                      ></path>
                    </svg>
                  </button>
                  <button
                    class="cart__item-info-qty__button cart__item-info-qty__button--decrement"
                  >
                    <svg
                      class="cart__item-info-qty__button-icon"
                      width="14"
                      height="8"
                      viewBox="0 0 10 6"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M5.35067 0.155633C5.33527 0.138307 5.31853 0.122147 5.30057 0.107295C5.1069 -0.0528817 4.81533 -0.0312402 4.64933 0.155633L0.111189 5.26432C0.0394387 5.34509 -4.76276e-07 5.44797 -4.85577e-07 5.55435C-5.07094e-07 5.80047 0.206781 6 0.461859 6L9.53813 6C9.64838 6 9.755 5.96194 9.83871 5.89271C10.0324 5.73253 10.0548 5.4512 9.8888 5.26432L5.35067 0.155633Z"
                        fill="#9199AB"
                      ></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <button class="cart__item-remove">
            <svg
              width="14"
              height="18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M10 2h3.6c.2 0 .4.2.4.4v1.2c0 .2-.2.4-.4.4H.4C.2 4 0 3.9 0 3.6V2.4c0-.2.2-.4.4-.3h3.7V2L4.9.3c.1-.2.2-.3.4-.3h3.5c.1 0 .3.1.4.2l.8 1.7V2zM1.8 16.1c.1 1 1 1.9 2 1.9h6.3c1.1 0 1.9-.8 2-1.9l1-11.1H1l.8 11.1zM12 6l-.8 10.1c0 .5-.5.9-1 .9H3.8c-.5 0-1-.4-1-.9L2 6h10zM5 8.1h1v6H5v-6zm4 0H8v6h1v-6z"
                fill="#9199AB"
              ></path>
            </svg>
          </button>
        </li>
      </ul>

      <div class="cart__total">
        <span class="cart__total-label">Total:</span>
        <strong class="cart__total-value">17,00USD</strong>
      </div>

      <div class="cart__form-wrapper">
        <h4 class="cart__section-title">Place an order</h4>

        <form class="cart__form">
          <div class="cart__form-group">
            <label class="cart__label required-field-label">Name</label>
            <input
              class="cart__input"
              type="text"
              placeholder="Your name"
              required
            />
          </div>

          <div class="cart__form-group">
            <label class="cart__label required-field-label">Email</label>
            <input
              class="cart__input"
              type="email"
              placeholder="Your email address"
              required
            />
          </div>

          <div class="cart__form-group">
            <label class="cart__label required-field-label">Phone</label>
            <input
              class="cart__input"
              type="tel"
              placeholder="Your phone"
              required
            />
          </div>

          <div class="cart__form-group">
            <label class="cart__label">Comment</label>
            <textarea
              class="cart__textarea"
              placeholder="Your comment"
            ></textarea>
          </div>

          <button class="cart__submit" type="submit">Order</button>
        </form>
      </div>
    </div>
  </div>
</div>

<section class="container best-deals">
  <h2 class="best-deals__title">Best deals</h2>
  <p class="best-deals__subtitle">Wines to Every Table</p>

  <img class="best-deals__illustration" src="img/illustration.svg" alt="" />
  <p class="best-deals__paragraph">
    Shop our best-selling wines. Click on the product images to see the details.
  </p>

  <div class="best-deals__carousel">
    <button class="best-deals__carousel__button-prev">prev</button>

    <div class="best-deals__carousel-items">
      <article class="best-deals__carousel-items__item">
        <img
          width="360"
          class="best-deals__carousel-items__item__image"
          src="img/wines-best-deals/cabernet.jpg"
          alt="Bottle of red wine with a white label reading “WINE” grape illustration, and “Cabernet” text on a dark background."
        />
        <h3 class="best-deals__carousel-items__item__name">Cabernet</h3>
        <p class="best-deals__carousel-items__item__price">17,00 USD</p>
        <button class="best-deals__carousel-items__item__button">Add to Cart</button>
      </article>
      <article class="best-deals__carousel-items__item">
        <img
          width="360"
          class="best-deals__carousel-items__item__image"
          src="img/wines-best-deals/sauvignon-blanc.jpg"
          alt="Bottle of white wine with a white label reading “WINE,” grape illustration, and “Sauvignon Blanc” text on a dark background."
        />
        <h3 class="best-deals__carousel-items__item__name">Sauvignon-Blanc</h3>
        <p class="best-deals__carousel-items__item__price">12,00 USD</p>
        <button class="best-deals__carousel-items__item__button">Add to Cart</button>
      </article>
      <article class="best-deals__carousel-items__item">
        <img
          width="360"
          class="best-deals__carousel-items__item__image"
          src="img/wines-best-deals/syrah.jpg"
          alt="Bottle of red wine with a white label reading “WINE” grape illustration, and “Syrah” text on a dark background."
        />
        <h3 class="best-deals__carousel-items__item__name">Syrah</h3>
        <p class="best-deals__carousel-items__item__price">13,00 USD</p>
        <button class="best-deals__carousel-items__item__button">Add to Cart</button>
      </article>
      <article class="best-deals__carousel-items__item">
        <img
          width="360"
          class="best-deals__carousel-items__item__image"
          src="img/wines-best-deals/pinot-grigio.jpg"
          alt="Bottle of white wine with a white label reading “WINE” grape illustration, and “Pinot Grigio” text on a dark background."
        />
        <h3 class="best-deals__carousel-items__item__name">Pinot-Grigio</h3>
        <p class="best-deals__carousel-items__item__price">10,00 USD</p>
        <button class="best-deals__carousel-items__item__button">Add to Cart</button>
      </article>
    </div>

    <button class="best-deals__carousel__button-next">next</button>
  </div>
  <div class="best-deals__carousel-controls">
    <button class="best-deals__carousel-controls__button">.</button>

    <button class="best-deals__carousel-controls__button">.</button>
  </div>
</section>

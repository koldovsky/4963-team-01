<section id="contact-us" class="newsletter">
  <div class="newsletter__container container">
    <div class="newsletter__content">
      <h2 class="newsletter__accent">Join</h2>
      <p class="newsletter__heading">Join Our Newsletter Now</p>
      <p class="newsletter__description">
        Learn more about wines and our special offers with our weekly digests.
      </p>
    </div>
    <form class="newsletter__form">
      <input type="email" class="newsletter__input" placeholder="Enter your email address here" required />
      <button type="submit" class="newsletter__button button--primary">Submit</button>
    </form>


  </div>
  <div class="newsletter__endline-container container">
    <svg xmlns="http://www.w3.org/2000/svg" class="newsletter__endline" width="3000px" height="31">
      <path d="M0 15.5 L3000 15.5" style="fill:none;stroke:rgba(255, 255, 255, 0.14);stroke-width:1px"></path>
    </svg>
  </div>

</section>
